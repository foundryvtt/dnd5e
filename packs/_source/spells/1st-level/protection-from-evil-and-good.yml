name: Protection from Evil and Good
ownership:
  default: 0
type: spell
system:
  description:
    value: >-
      <p>Until the spell ends, one willing creature you touch is protected
      against certain types of creatures: aberrations, celestials, elementals,
      fey, fiends, and undead.</p><p>The protection grants several benefits.
      Creatures of those types have disadvantage on attack rolls against the
      target. The target also can't be &amp;reference[charmed apply=false],
      &amp;reference[frightened apply=false], or possessed by them. If the
      target is already charmed, frightened, or possessed by such a creature,
      the target has advantage on any new saving throw against the relevant
      effect.</p>
