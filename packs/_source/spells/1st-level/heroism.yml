name: Heroism
ownership:
  default: 0
type: spell
system:
  description:
    value: >-
      <p>A willing creature you touch is imbued with bravery. Until the spell
      ends, the creature is immune to being &amp;reference[Frightened
      apply=false] and gains Temporary Hit Points equal to your Spellcasting
      ability modifier at the start of each of its turns. When the spell ends,
      the target loses any remaining temporary hit points from this
      spell.</p><p><strong>At Higher Levels.</strong> When you cast this spell
      using a spell slot of 2nd level or higher, you can target one additional
      creature for each slot level above 1st.</p>
