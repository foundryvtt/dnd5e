name: Bless
type: spell
img: icons/magic/symbols/runes-carved-stone-yellow.webp
system:
  description:
    value: >-
      <p>You bless up to three creatures of your choice within range. Whenever a
      target makes an attack roll or a saving throw before the spell ends, the
      target can roll 1d4 and add the number rolled to the attack roll or saving
      throw.</p>

      <p><strong>At Higher Levels.</strong> When you cast this spell using a
      spell slot of 2nd level or higher, you can target one additional creature
      for each slot level above 1st.</p>
